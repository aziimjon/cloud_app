name: cloud_app
description: Cloud storage app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: "^3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_bloc: ^8.1.6
  equatable: ^2.0.8

  dio: ^5.9.1
  pretty_dio_logger: ^1.4.0

  flutter_secure_storage: ^9.2.4

  go_router: ^14.8.1

  tus_client: ^1.0.2
  cross_file: ^0.3.5+2
  file_picker: ^8.0.0
  mime: ^1.0.4
  cached_network_image: ^3.3.1
  workmanager: ^0.6.0
  path_provider: ^2.1.2
  path: ^1.9.0
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.3
  video_player: ^2.8.7
  shared_preferences: ^2.5.4
  intl: 0.20.2
  sqflite: ^2.3.2
  photo_manager: ^3.0.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/mycloud.png
